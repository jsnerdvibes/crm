name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  NODE_ENV: test
  PORT: 4000
  DATABASE_HOST: 127.0.0.1
  DATABASE_USER: root
  DATABASE_PASSWORD: root123
  DATABASE_NAME: crm_ci
  DATABASE_PORT: 3306
  DATABASE_URL: mysql://root:root123@127.0.0.1:3306/crm_ci
  JWT_SECRET: this-is-a-long-jwt-secret-string
  JWT_REFRESH_SECRET: this-is-a-long-refresh-secret
  JWT_EXPIRES_IN: 15m
  TENANCY_MODE: field
  BCRYPT_SALT_ROUNDS: 10

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Run linter
        run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root123
          MYSQL_DATABASE: crm_ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot123"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Apply Prisma migrations
        run: npm run prisma:migrate:deploy

      - name: Run tests
        run: npm run test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs:
      - lint
      - test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Build project
        run: npm run build
