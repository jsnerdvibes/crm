version: "3.8"

services:
  app:
    build: .
    container_name: saas_app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3001:3001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev
